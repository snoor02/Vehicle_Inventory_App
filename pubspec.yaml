name: parts
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.2.1
  provider: ^6.0.5
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  firebase_storage: ^12.3.0
  supabase_flutter: ^2.5.8
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png" # place your logo here later
